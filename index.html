<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Guardian – Smart medication companion app for managing your daily health." />
  <title>Guardian – Smart Companion</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#004a76",
            "primary-container": "#126398",
            "secondary": "#2c694e",
            "surface-container": "#edeeef",
            "on-surface": "#191c1d",
            "on-surface-variant": "#40484f",
            "background": "#f8f9fa",
          },
          fontFamily: {
            headline: ["Plus Jakarta Sans", "sans-serif"],
            body: ["Lexend", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    :root { --nav-height: 64px; }
    body { font-family: 'Lexend', sans-serif; background-color: #f8f9fa; }
    .med-input {
      background-color: #e1e3e4;
      border: none;
      border-bottom: 3px solid #c0c7d0;
      border-radius: 12px 12px 0 0;
      height: 60px;
      padding: 0 1.25rem;
      width: 100%;
      transition: all 0.2s;
      font-family: 'Lexend', sans-serif;
      font-size: 14px;
    }
    .med-input:focus { outline: none; border-bottom-color: #004a76; background-color: #d5d8da; }
    textarea.med-input {
      height: 90px;
      padding-top: 14px;
      padding-bottom: 14px;
      resize: none;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #004a76;
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      opacity: 0;
      transition: all 0.25s;
      z-index: 9999;
      font-family: 'Lexend', sans-serif;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body class="bg-background text-on-surface min-h-screen">
  <div id="toast" role="status"></div>

  <header class="sticky top-0 z-40 w-full bg-[#f8f9fa]/90 backdrop-blur-md border-b border-gray-200 h-[64px]">
    <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary rounded-xl flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-[18px]">favorite</span>
        </div>
        <span class="text-xl font-extrabold tracking-tight text-primary font-headline">Guardian</span>
      </div>
      <nav class="hidden md:flex items-center gap-6">
        <a href="#" class="font-bold text-primary">Home</a>
        <a href="#" class="text-on-surface-variant hover:text-primary">Meds</a>
        <a href="#" class="text-on-surface-variant hover:text-primary">Chat</a>
      </nav>
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
        <span class="text-sm font-medium">Arthur</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 pt-8 pb-16">
    <section class="mb-10">
      <h1 class="font-headline text-4xl font-extrabold text-primary mb-2">Good morning, Arthur!</h1>
      <p class="text-on-surface-variant">Keep track of your health and medications in one place.</p>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-7 space-y-6">

        <article class="bg-gray-50 rounded-3xl p-8 border border-gray-200">
          <h3 class="text-xl font-bold mb-6">Log Medication</h3>
          <form id="log-form" class="space-y-4">
            <input id="med-name" class="med-input" placeholder="Medication Name (e.g. Vitamin D3)" required />
            <input id="dosage" class="med-input" placeholder="Dosage (e.g. 1 Tablet)" required />
            <textarea id="notes" class="med-input" placeholder="Notes (e.g. Take with food)"></textarea>
            <button type="submit" id="submit-btn" class="w-full h-14 bg-primary text-white rounded-2xl font-bold shadow-lg hover:bg-primary-container transition-all">
              <span id="btn-label">Log Entry</span>
            </button>
          </form>
        </article>

        <article class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-bold">Recent History</h3>
            <button onclick="loadHistory()" class="text-primary text-sm font-bold flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">refresh</span> Refresh
            </button>
          </div>
          <div id="history-list" class="space-y-4">
            <p class="text-gray-400 italic text-sm text-center">No activity recorded yet.</p>
          </div>
        </article>
      </div>

      <div class="lg:col-span-5">
        <article class="bg-white rounded-3xl flex flex-col shadow-sm border border-gray-100 h-[600px]">
          <div class="p-5 border-b flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
              <span class="material-symbols-outlined text-primary text-sm">smart_toy</span>
            </div>
            <span class="font-bold">Guardian Assistant</span>
          </div>
          <div id="chat-messages" class="flex-grow overflow-y-auto p-5 space-y-4 text-sm">
            <div class="bg-gray-100 p-3 rounded-2xl rounded-tl-none max-w-[85%]">Hello Arthur! How can I help with your meds today?</div>
          </div>
          <div class="p-4 border-t flex gap-2">
            <input id="chat-input" class="flex-grow bg-gray-50 rounded-xl px-4 h-12 focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="Ask a question..." />
            <button id="send-btn" class="w-12 h-12 bg-primary text-white rounded-xl flex items-center justify-center">
              <span class="material-symbols-outlined">send</span>
            </button>
          </div>
        </article>
      </div>
    </div>
  </main>

  <script>
    // PRODUCTION URL
    const N8N_URL = 'https://aungpyae2070.app.n8n.cloud/webhook/a7d644ba-75ec-49a3-88d4-7cccd1f2f133';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // LOAD HISTORY FUNCTION
    async function loadHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = '<p class="text-gray-400 italic text-sm text-center">Fetching history...</p>';
      
      try {
        const res = await fetch(N8N_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "fetch_history" })
        });
        const data = await res.json();
        const history = data.history || [];
        
        list.innerHTML = history.length ? '' : '<p class="text-gray-400 text-sm text-center">No records found in database.</p>';

        history.slice(0, 5).forEach(item => {
          const div = document.createElement('div');
          div.className = "flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100";
          div.innerHTML = `
            <div class="w-10 h-10 bg-blue-50 text-primary rounded-full flex items-center justify-center shrink-0">
              <span class="material-symbols-outlined text-[20px]">pill</span>
            </div>
            <div class="flex-grow">
              <p class="font-bold text-sm">${item.medication_name}</p>
              <p class="text-xs text-gray-500">${item.dosage} • ${new Date(item.taken_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
            </div>
            ${item.notes ? `<span class="material-symbols-outlined text-gray-300 text-[20px]" title="${item.notes}">info</span>` : ''}
          `;
          list.appendChild(div);
        });
      } catch (e) {
        list.innerHTML = '<p class="text-red-400 text-sm text-center">Unable to connect to Guardian server.</p>';
      }
    }

    // LOG MEDICATION HANDLER
    document.getElementById('log-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btnLabel = document.getElementById('btn-label');
      const payload = {
        action: "log",
        medication_name: document.getElementById('med-name').value,
        dosage: document.getElementById('dosage').value,
        notes: document.getElementById('notes').value
      };

      btnLabel.textContent = 'Logging...';
      try {
        await fetch(N8N_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showToast(`✓ Logged ${payload.medication_name}`);
        document.getElementById('log-form').reset();
        
        // We call loadHistory here so the UI updates immediately after a log
        loadHistory(); 
      } catch (e) { 
        showToast("Logging failed. Check connection."); 
      }
      btnLabel.textContent = 'Log Entry';
    });

    // CHAT ASSISTANT HANDLER
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = isUser
        ? "bg-primary text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] ml-auto"
        : "bg-gray-100 p-3 rounded-2xl rounded-tl-none max-w-[85%]";
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.onclick = async () => {
      const text = chatInput.value.trim();
      if (!text) return;
      addMessage(text, true);
      chatInput.value = '';
      
      const loading = document.createElement('div');
      loading.className = "text-gray-400 text-xs italic p-2";
      loading.textContent = "Guardian is thinking...";
      chatMessages.appendChild(loading);

      try {
        const res = await fetch(N8N_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "chat", message: text })
        });
        const data = await res.json();
        loading.remove();
        addMessage(data.output || "I'm having trouble responding right now.");
      } catch (e) { 
        loading.textContent = "Guardian is currently offline."; 
      }
    };

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendBtn.onclick();
    });

    // AUTOMATIC FETCH IS DISABLED FOR THE DEMO
    // window.onload = loadHistory; 
  </script>
</body>
</html>
