<body class="bg-background text-on-surface min-h-screen">
  <div id="toast" role="status"></div>

  <header class="sticky top-0 z-40 w-full bg-[#f8f9fa]/90 backdrop-blur-md border-b border-outline-variant/30 h-[64px]">
    <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary rounded-xl flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-[18px]">favorite</span>
        </div>
        <span class="text-xl font-extrabold tracking-tight text-primary font-headline">Guardian</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
        <span class="text-sm font-medium">Arthur</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 pt-8 pb-16">
    <section class="mb-10">
      <h1 class="font-headline text-4xl font-extrabold text-primary mb-2">Good morning, Arthur!</h1>
      <p class="text-on-surface-variant">Keep track of your health and medications in one place.</p>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-7 space-y-6">
        
        <article class="bg-gray-50 rounded-3xl p-8 border border-gray-200">
          <h3 class="text-xl font-bold mb-6">Log Medication</h3>
          <form id="log-form" class="space-y-4">
            <input id="med-name" class="med-input" placeholder="Medication Name (e.g. Vitamin D3)" required />
            <input id="dosage" class="med-input" placeholder="Dosage (e.g. 1 Tablet)" required />
            <textarea id="notes" class="med-input" placeholder="Notes (e.g. Take with food)"></textarea>
            <button type="submit" id="submit-btn" class="w-full h-14 bg-primary text-white rounded-2xl font-bold shadow-lg hover:bg-primary-container transition-all">
              <span id="btn-label">Log Entry</span>
            </button>
          </form>
        </article>

        <article class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-bold">Recent History</h3>
            <button onclick="loadHistory()" class="text-primary text-sm font-bold flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">refresh</span> Refresh
            </button>
          </div>
          <div id="history-list" class="space-y-4">
            <p class="text-gray-400 italic text-sm text-center">Loading history...</p>
          </div>
        </article>
      </div>

      <div class="lg:col-span-5">
        <article class="bg-white rounded-3xl flex flex-col shadow-sm border border-gray-100 h-[600px]">
          <div class="p-5 border-b flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">smart_toy</span></div>
            <span class="font-bold">Guardian Assistant</span>
          </div>
          <div id="chat-messages" class="flex-grow overflow-y-auto p-5 space-y-4 text-sm">
            <div class="bg-gray-100 p-3 rounded-2xl rounded-tl-none max-w-[85%]">Hello Arthur! How can I help with your meds today?</div>
          </div>
          <div class="p-4 border-t flex gap-2">
            <input id="chat-input" class="flex-grow bg-gray-50 rounded-xl px-4 h-12 focus:outline-none" placeholder="Ask a question..." />
            <button id="send-btn" class="w-12 h-12 bg-primary text-white rounded-xl flex items-center justify-center"><span class="material-symbols-outlined">send</span></button>
          </div>
        </article>
      </div>
    </div>
  </main>

  <script>
    const N8N_URL = 'https://aungpyae2070.app.n8n.cloud/webhook-test/a7d644ba-75ec-49a3-88d4-7cccd1f2f133';

    // 1. SHOW TOAST
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // 2. LOAD HISTORY FROM N8N/SUPABASE
    async function loadHistory() {
      const list = document.getElementById('history-list');
      try {
        const res = await fetch(N8N_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "fetch_history" })
        });
        const data = await res.json();
        
        // Ensure data is an array (adjust based on your n8n output)
        const history = data.history || [];
        list.innerHTML = history.length ? '' : '<p class="text-gray-400 text-sm">No recent logs found.</p>';
        
        history.slice(0, 5).forEach(item => {
          const div = document.createElement('div');
          div.className = "flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100";
          div.innerHTML = `
            <div class="w-10 h-10 bg-primary/10 text-primary rounded-full flex items-center justify-center shrink-0">
              <span class="material-symbols-outlined">pill</span>
            </div>
            <div class="flex-grow">
              <p class="font-bold text-sm">${item.medication_name}</p>
              <p class="text-xs text-gray-500">${item.dosage} • ${new Date(item.taken_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
            </div>
            ${item.notes ? `<span class="material-symbols-outlined text-gray-300" title="${item.notes}">info</span>` : ''}
          `;
          list.appendChild(div);
        });
      } catch (e) {
        list.innerHTML = '<p class="text-red-400 text-sm">Could not load history.</p>';
      }
    }

    // 3. LOG MEDICATION
    document.getElementById('log-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-label');
      const payload = {
        action: "log",
        medication_name: document.getElementById('med-name').value,
        dosage: document.getElementById('dosage').value,
        notes: document.getElementById('notes').value
      };

      btn.textContent = 'Logging...';
      try {
        await fetch(N8N_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showToast(`✓ Logged ${payload.medication_name}`);
        document.getElementById('log-form').reset();
        loadHistory(); // Refresh the board
      } catch (e) { showToast("Error logging."); }
      btn.textContent = 'Log Entry';
    });

    // 4. AI CHAT (Existing logic)
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = isUser ? "bg-primary text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] ml-auto" : "bg-gray-100 p-3 rounded-2xl rounded-tl-none max-w-[85%]";
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.onclick = async () => {
      const text = chatInput.value.trim();
      if (!text) return;
      addMessage(text, true);
      chatInput.value = '';
      const loading = document.createElement('div');
      loading.className = "text-gray-400 text-xs italic"; loading.textContent = "Guardian is thinking...";
      chatMessages.appendChild(loading);

      try {
        const res = await fetch(N8N_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "chat", message: text })
        });
        const data = await res.json();
        loading.remove();
        addMessage(data.output || "I'm having trouble responding right now.");
      } catch (e) { loading.textContent = "Error."; }
    };

    // Load history on startup
    window.onload = loadHistory;
  </script>
</body>
